services:
  mongodb:
    image: mongo:latest
    environment:
      MONGO_INITDB_DATABASE: hakuvahti
    ports:
      - "27017:27017"
    networks:
      - internal

  app:
    user: "${DOCKER_UID:-1000}:${DOCKER_GID:-1000}"
    build:
      context: .
      dockerfile: openshift/Dockerfile
      target: development
    hostname: hakuvahti
    # Environment configuration for development.
    # See .env file for descriptions.
    environment:
      FASTIFY_PORT: ${FASTIFY_PORT:-3000}
      MONGODB: mongodb://mongodb:27017/hakuvahti
      ENVIRONMENT: ${ENVIRONMENT:-local}
      NODE_TLS_REJECT_UNAUTHORIZED: ${NODE_TLS_REJECT_UNAUTHORIZED:-1}
      HAKUVAHTI_API_KEY: ${HAKUVAHTI_API_KEY:-123}
      # Sentry (optional)
      SENTRY_DSN: ${SENTRY_DSN:-}
      SENTRY_RELEASE: ${SENTRY_RELEASE:-}
      # ATV
      ATV_API_KEY: ${ATV_API_KEY}
      ATV_API_URL: ${ATV_API_URL}
      # Nodemailer settings
      MAIL_FROM: ${MAIL_FROM:-noreply@hel.fi}
      MAIL_HOST: ${MAIL_HOST:-host-machine.local}
      MAIL_PORT: ${MAIL_PORT:-1025}
      MAIL_SECURE: ${MAIL_SECURE:-}
      MAIL_AUTH_USER: ${MAIL_AUTH_USER:-}
      MAIL_AUTH_PASS: ${MAIL_AUTH_PASS:-}
      # SMS
      DIALOGI_API_URL: ${DIALOGI_API_URL:-}
      DIALOGI_API_KEY: ${DIALOGI_API_KEY:-}
      DIALOGI_SENDER: ${DIALOGI_SENDER:-}
      TEST_SMS_NUMBER: ${TEST_SMS_NUMBER:-}
    volumes:
      - .:/app:delegated
    ports:
      - "3000:3000"
    depends_on:
      - mongodb
    networks:
      - internal
      - stonehenge-network
    extra_hosts:
      - "helfi-rekry.docker.so:host-gateway"
      - "elastic-helfi-rekry.docker.so:host-gateway"
      - "host-machine.local:host-gateway"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.hakuvahti-app.entrypoints=https"
      - "traefik.http.routers.hakuvahti-app.rule=Host(`hakuvahti.docker.so`)"
      - "traefik.http.routers.hakuvahti-app.tls=true"
      - "traefik.http.services.hakuvahti-app.loadbalancer.server.port=3000"
      - "traefik.docker.network=stonehenge-network"

volumes:
  node_modules:

networks:
  internal:
    internal: true
  stonehenge-network:
    external: true
