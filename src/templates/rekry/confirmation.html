<h1 style="font-weight: normal;">{{ email_confirmation_title }}</h1>
<p>{{ email_confirmation_intro }}</p>
<p><b>{{ email_confirmation_search_description }}:</b> {{ search_description }} </p>
<table role="presentation" cellpadding="0" cellspacing="0" border="0" style="margin:16px 0;">
  <tr>
    <td align="center" bgcolor="#000000" style="border-radius:0;">
      <a href="{{ link }}"
        style="display:inline-block;padding:12px 28px;font-size:16px;line-height:1.2;color:#ffffff;text-decoration:none;font-weight:600;font-family:Arial, Helvetica, sans-serif;background-color:#000000;border:1px solid #000000;">
        {{ email_confirmation_button }}
      </a>
    </td>
  </tr>
</table>
<p>{{ email_confirmation_ignore }}</p>
<p></p>
<p style="font-size: 12px; color: #666;">{{ email_generic_automatically_sent }}</p>
